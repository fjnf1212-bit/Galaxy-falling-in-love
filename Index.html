<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Written In The Stars ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#2d1b69,#120136 35%,#050816 70%,#000 100%);
position:relative;
color:white;
}

/* ===== Background Galaxy ===== */

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{
opacity:.2;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1.4);
}
}

/* Nebula */

.nebula{
position:absolute;
width:450px;
height:450px;
background:radial-gradient(circle,
rgba(123,92,255,.35),
transparent 70%);
filter:blur(80px);
top:-120px;
left:-100px;
animation:floatNebula 8s ease-in-out infinite alternate;
}

.nebula2{
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,
rgba(0,183,255,.20),
transparent 70%);
bottom:-180px;
right:-150px;
filter:blur(90px);
animation:floatNebula 10s ease-in-out infinite alternate;
}

@keyframes floatNebula{
from{
transform:translateY(0px);
}
to{
transform:translateY(30px);
}
}

/* Shooting Star */

.shooting-star{
position:absolute;
width:150px;
height:2px;
background:linear-gradient(90deg,white,transparent);
transform:rotate(-35deg);
animation:shoot 7s linear infinite;
opacity:.8;
}

@keyframes shoot{

0%{
top:-10%;
left:-20%;
opacity:0;
}

15%{
opacity:1;
}

100%{
top:120%;
left:120%;
opacity:0;
}
}/* ========================= */
/*        GLASS CARD         */
/* ========================= */

.card{
position:relative;
width:90%;
max-width:380px;
padding:35px 28px;
text-align:center;

background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);
border-radius:28px;

box-shadow:
0 0 25px rgba(120,119,255,.25),
0 0 60px rgba(0,180,255,.10);

z-index:10;

animation:cardFloat 5s ease-in-out infinite;
overflow:hidden;
}

/* Glow Border */

.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:30px;
padding:2px;

background:linear-gradient(
135deg,
#7c5cff,
#42c8ff,
#b26dff,
#7c5cff
);

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

opacity:.9;
}

/* Blur Circle */

.card::after{
content:"";
position:absolute;
width:180px;
height:180px;
background:rgba(255,255,255,.08);
border-radius:50%;
top:-90px;
right:-70px;
filter:blur(15px);
}

@keyframes cardFloat{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

}

h1{
font-size:30px;
font-weight:700;
margin-bottom:15px;

background:linear-gradient(
90deg,
#ffffff,
#d9c8ff,
#89dfff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:16px;
line-height:1.8;
color:#f2f2f2;
opacity:.95;
margin-bottom:25px;
}

button{

padding:13px 30px;

border:none;
border-radius:50px;

font-size:16px;
font-weight:600;

background:linear-gradient(
90deg,
#7c5cff,
#45c7ff
);

color:white;

cursor:pointer;

transition:.35s;

box-shadow:
0 0 18px rgba(124,92,255,.45);

}

button:hover{

transform:scale(1.08);

box-shadow:
0 0 30px rgba(124,92,255,.7);

}

#message{

display:none;

margin-top:25px;

font-size:15px;

line-height:1.8;

animation:fade .8s;

color:#fff;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

  }</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="nebula"></div>
<div class="nebula2"></div>

<div class="shooting-star"></div>

<div class="card">

<h1>Hi Stranger 🌌</h1>

<p class="subtitle" id="typing"></p>

<button onclick="showMessage()">
Open Note ✨
</button>

<div id="message">

💜<br><br>

Terima kasih sudah meluangkan waktu buat buka halaman kecil ini.

Semoga hari-harimu selalu dipenuhi hal-hal baik.

Kalau hari ini terasa berat, semoga besok datang dengan banyak alasan untuk tersenyum.

Take care ya. 🌙✨

</div>

</div><script>

// Efek mengetik
const text =
"Hari mu gimana?\n\nSemoga semuanya berjalan dengan baik ya.\nTerima kasih sudah mampir ke halaman kecil ini ✨";

let i = 0;
const typing = document.getElementById("typing");

function typeWriter(){
    if(i < text.length){
        if(text.charAt(i) == "\n"){
            typing.innerHTML += "<br>";
        }else{
            typing.innerHTML += text.charAt(i);
        }
        i++;
        setTimeout(typeWriter,45);
    }
}

typeWriter();

// Tombol Open Note
function showMessage(){
    document.getElementById("message").style.display="block";
}

// Generate bintang
const stars = document.getElementById("stars");

for(let i=0;i<220;i++){

    let star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"%";

    star.style.top=Math.random()*100+"%";

    star.style.animationDelay=Math.random()*3+"s";

    star.style.animationDuration=(2+Math.random()*4)+"s";

    stars.appendChild(star);

}

// Shooting star acak
setInterval(()=>{

const shoot=document.querySelector(".shooting-star");

shoot.style.animation="none";

shoot.offsetHeight;

shoot.style.top=Math.random()*30+"%";
shoot.style.left="-20%";

shoot.style.animation="shoot 3s linear";

},6000);

</script>

</body>
  </html>
